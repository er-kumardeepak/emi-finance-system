services:
  - type: web
    name: crediflow-backend
    env: node
    rootDir: SF-Backend-main/SF-Backend-main
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false

